<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 260px;
      padding: 16px;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #f8f9fa;
      color: #333;
      margin: 0;
    }
    .header {
      text-align: center;
      margin-bottom: 16px;
    }
    .header img {
      width: 32px;
      height: 32px;
      margin-bottom: 6px;
    }
    .header h2 {
      font-size: 16px;
      margin: 0;
      color: #1a1a1a;
      letter-spacing: 0.5px;
    }
    .pet-list {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
    }
    .pet-card {
      background: white;
      border: 2px solid #eee;
      border-radius: 10px;
      padding: 8px;
      display: flex;
      align-items: center;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .pet-card:hover {
      border-color: #333;
      transform: translateY(-1px);
    }
    .pet-card.active {
      border-color: #333;
      background: #f0f0f0;
    }
    .pet-preview {
      width: 40px;
      height: 44px; /* 192x208 scaled */
      background-size: 320px 390px; /* Spritesheet scaled */
      background-position: 0 0;
      background-repeat: no-repeat;
      image-rendering: pixelated;
      margin-right: 12px;
      border-radius: 4px;
      background-color: #f0f0f0;
    }
    .pet-info b {
      font-size: 14px;
      text-transform: capitalize;
    }
    #loading {
      text-align: center;
      font-size: 12px;
      color: #999;
    }
  </style>
</head>
<body>
  <div class="header">
    <img src="kernel-logo.png">
    <h2>Choose Pet</h2>
  </div>
  <div id="loading">Loading pets...</div>
  <div class="pet-list" id="petList"></div>
  <script src="popup.js"></script>
</body>
</html>
